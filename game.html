<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix — 2014 Classic</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Verdana', 'Arial', sans-serif; user-select: none; }
        
        /* GUI: все элементы поверх игры */
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        /* ========== СТИЛЬ 2014 ========== */
        .window-2014 {
            background: linear-gradient(#f0f0f0, #c0c0c0);
            border: 2px solid #000;
            border-radius: 8px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
            font-weight: bold;
            color: black;
            pointer-events: auto;
            padding: 6px;
        }

        /* Красная кнопка Exit */
        #exit-btn {
            position: absolute; top: 10px; left: 10px;
            background: linear-gradient(#ff4d4d, #b30000);
            border: 2px solid #660000;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            padding: 8px 20px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #000;
            text-shadow: 1px 1px 0 #000;
            pointer-events: auto;
        }
        #exit-btn:hover { background: linear-gradient(#ff6666, #cc0000); }

        /* Зелёный бар здоровья */
        #health-container {
            position: absolute; top: 10px; left: 130px;
            width: 200px; height: 30px;
            background: #333;
            border: 2px solid #000;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 2px 2px 0 #000;
            pointer-events: auto;
        }
        #health-bar {
            height: 100%; width: 100%;
            background: linear-gradient(#7cfc00, #32cd32);
        }

        /* Жёлтая таблица игроков (справа) */
        #player-list {
            position: absolute; top: 10px; right: 10px;
            width: 180px;
            background: linear-gradient(#ffd700, #ffb347);
            border: 2px solid #b8860b;
            border-radius: 8px;
            box-shadow: 3px 3px 0 #000;
            font-weight: bold;
            pointer-events: auto;
        }
        .pl-head {
            background: linear-gradient(#ffaa00, #cc8400);
            padding: 8px; text-align: center; font-size: 16px;
            border-bottom: 2px solid #8b5a00;
            color: #000;
            text-shadow: 1px 1px 0 #ffd700;
        }
        .pl-row {
            padding: 6px 10px; font-size: 14px;
            border-bottom: 1px solid #cc8400;
            color: #000;
        }
        .pl-row:last-child { border-bottom: none; }

        /* Синяя панель чата (внизу слева) */
        #chat-panel {
            position: absolute; bottom: 10px; left: 10px;
            width: 450px;
            background: linear-gradient(#1e90ff, #104e8b);
            border: 3px solid #0a2f6a;
            border-radius: 10px;
            box-shadow: 4px 4px 0 #000;
            padding: 8px;
            pointer-events: auto;
        }
        #chat-history {
            height: 150px; overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border: 2px solid #0a2f6a;
            border-radius: 6px;
            padding: 5px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            font-size: 16px;
        }
        .chat-msg { margin: 2px 0; }
        #chat-input-area {
            display: flex; margin-top: 8px;
        }
        #chat-label {
            background: #0a2f6a; color: white; font-weight: bold;
            padding: 6px 12px; border-radius: 6px 0 0 6px;
            border: 1px solid #000;
            text-shadow: 1px 1px 0 #000;
        }
        #chat-input {
            flex: 1; background: white; border: 2px solid #0a2f6a;
            border-left: none; padding: 6px 10px; font-size: 16px;
            outline: none; border-radius: 0 6px 6px 0;
            font-family: 'Verdana', sans-serif;
        }
        #chat-input:disabled { background: #ccc; }

        /* Надпись "Make by: Waztern" */
        #credits {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.5); color: white; font-size: 12px;
            padding: 4px 8px; border-radius: 4px; border: 1px solid #888;
            font-style: italic; pointer-events: auto;
        }
    </style>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="gui">
        <!-- Красная кнопка Exit -->
        <div id="exit-btn">Exit</div>

        <!-- Зелёный бар здоровья -->
        <div id="health-container">
            <div id="health-bar"></div>
        </div>

        <!-- Жёлтая таблица игроков -->
        <div id="player-list">
            <div class="pl-head">Players</div>
            <div class="pl-row" id="my-name-row">Загрузка...</div>
        </div>

        <!-- Синий чат -->
        <div id="chat-panel">
            <div id="chat-history"></div>
            <div id="chat-input-area">
                <div id="chat-label">Say:</div>
                <input id="chat-input" type="text" disabled>
            </div>
        </div>

        <!-- Надпись "Make by: Waztern" -->
        <div id="credits">Make by: Waztern</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Данные игрока ---
        const username = localStorage.getItem('ternix_user') || "Player1";
        // Цвет ника (для чата)
        function getNameColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
            return "#" + "00000".substring(0, 6 - c.length) + c;
        }
        const myColor = getNameColor(username);
        document.getElementById('my-name-row').innerText = username;

        // --- Кнопка Exit ---
        document.getElementById('exit-btn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // --- Сцена THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Освещение
        scene.add(new THREE.AmbientLight(0x888888));
        const sun = new THREE.DirectionalLight(0xffffff, 1.3);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // Пол (Baseplate)
        const baseplateMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const baseplate = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), baseplateMat);
        baseplate.rotation.x = -Math.PI / 2;
        scene.add(baseplate);

        // Сетка для ориентира (можно оставить, но она полупрозрачная)
        scene.add(new THREE.GridHelper(400, 100, 0x666666, 0x555555));

        // --- Игрок (модель) ---
        const player = new THREE.Group();
        scene.add(player);

        new GLTFLoader().load('Ternix.Guy.glb', (gltf) => {
            const model = gltf.scene;
            // Поворачиваем модель один раз, чтобы она смотрела в нужную сторону (например, вдоль +Z)
            model.rotation.y = Math.PI; // или 0, зависит от ориентации модели
            player.add(model);
        }, undefined, () => {
            // Заглушка-кубик, если модель не загрузится
            const matY = new THREE.MeshStandardMaterial({color:0xffff00});
            const matB = new THREE.MeshStandardMaterial({color:0x0000ff});
            const matG = new THREE.MeshStandardMaterial({color:0x00aa00});
            const head = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), matY); head.position.y=4.5;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2,2,1), matB); torso.position.y=3;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); lLeg.position.set(-0.5,1,0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); rLeg.position.set(0.5,1,0);
            player.add(head, torso, lLeg, rLeg);
        });

        // --- Управление (классическое: W - вперёд, S - назад, A - влево, D - вправо, без поворота персонажа) ---
        let camDist = 20;
        let camYaw = 0;          // горизонтальный угол камеры
        let camPitch = 0.5;       // вертикальный угол
        let isLeftDown = false;
        let velocityY = 0;
        let isGrounded = false;

        window.addEventListener('mousedown', e => { if(e.button===0) isLeftDown=true; });
        window.addEventListener('mouseup', e => { if(e.button===0) isLeftDown=false; });
        window.addEventListener('mousemove', e => {
            if(isLeftDown) {
                camYaw -= e.movementX * 0.005;
                camPitch -= e.movementY * 0.005;
                camPitch = Math.max(0.1, Math.min(1.5, camPitch));
            }
        });
        window.addEventListener('wheel', e => {
            camDist += e.deltaY * 0.05;
            camDist = Math.max(5, Math.min(50, camDist));
        });

        const keys = { w:false, a:false, s:false, d:false };
        
        document.addEventListener('keydown', e => {
            const chatInput = document.getElementById('chat-input');
            
            // Если чат активен
            if(!chatInput.disabled) {
                if(e.code === 'Enter') {
                    e.preventDefault();
                    sendChat();
                }
                if(e.code === 'Escape') {
                    e.preventDefault();
                    deactivateChat();
                }
                return;
            }

            // Движение (WASD) — переназначим правильно
            if(e.code === 'KeyW') keys.w = true;
            if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'KeyA') keys.a = true;
            if(e.code === 'KeyD') keys.d = true;
            
            if(e.code === 'Space' && isGrounded) {
                velocityY = 0.6;
                isGrounded = false;
            }
            
            if(e.code === 'Slash') {
                e.preventDefault();
                activateChat();
            }
        });
        
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') keys.w = false;
            if(e.code === 'KeyS') keys.s = false;
            if(e.code === 'KeyA') keys.a = false;
            if(e.code === 'KeyD') keys.d = false;
        });

        // --- Физика и анимация (без поворота персонажа) ---
        function animate() {
            requestAnimationFrame(animate);

            // Гравитация
            velocityY -= 0.025;
            player.position.y += velocityY;
            if(player.position.y <= 0) {
                player.position.y = 0;
                velocityY = 0;
                isGrounded = true;
            }

            // Направления относительно камеры
            const camDir = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw)).normalize();
            const camRight = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2)).normalize();
            
            // Вперёд (W) = camDir, назад (S) = -camDir, влево (A) = -camRight, вправо (D) = camRight
            const move = new THREE.Vector3(0,0,0);
            if(keys.w) move.add(camDir);
            if(keys.s) move.sub(camDir);
            if(keys.a) move.sub(camRight);
            if(keys.d) move.add(camRight);

            if(move.length() > 0) {
                player.position.addScaledVector(move.normalize(), 0.2);
                // Модель НЕ ПОВОРАЧИВАЕМ, оставляем как есть
            }

            // Камера (вид от третьего лица)
            const cx = player.position.x + camDist * Math.sin(camYaw) * Math.cos(camPitch);
            const cy = player.position.y + camDist * Math.sin(camPitch);
            const cz = player.position.z + camDist * Math.cos(camYaw) * Math.cos(camPitch);
            camera.position.set(cx, cy, cz);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 3, 0)));

            renderer.render(scene, camera);
        }
        animate();

        // --- Чат (синий) ---
        const chatInput = document.getElementById('chat-input');
        const chatHist = document.getElementById('chat-history');

        function activateChat() {
            chatInput.disabled = false;
            chatInput.focus();
            // Сброс движения
            keys.w = keys.a = keys.s = keys.d = false;
        }
        
        function deactivateChat() {
            chatInput.disabled = true;
            chatInput.blur();
        }

        function sendChat() {
            const txt = chatInput.value.trim();
            if(txt) {
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerHTML = `<span style="color:${myColor}">[${username}]:</span> ${txt}`;
                chatHist.appendChild(msg);
                chatHist.scrollTop = chatHist.scrollHeight;
            }
            chatInput.value = "";
            // Оставляем чат активным
        }

        // Обработчик Enter на поле ввода
        chatInput.addEventListener('keydown', (e) => {
            if(e.code === 'Enter') {
                e.preventDefault();
                sendChat();
            }
        });

        // Ресайз
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
