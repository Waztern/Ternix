<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Player</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }
        
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        /* Чат-история */
        #chat-history {
            position: absolute; top: 10px; left: 10px; width: 500px; height: 350px;
            display: flex; flex-direction: column; justify-content: flex-start;
            overflow-y: auto; /* чтобы можно было скроллить */
            font-size: 18px; font-weight: bold;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }
        .chat-msg { margin-bottom: 4px; color: white; }

        /* Строка ввода (всегда внизу) */
        #chat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 32px;
            background: rgba(0, 0, 0, 0.8); border-top: 1px solid #666;
            pointer-events: auto; display: flex; align-items: center;
        }
        #chat-label { color: #00a2ff; font-weight: bold; padding: 0 10px; font-size: 14px; }
        #chat-input {
            flex: 1; background: transparent; border: none; color: white; 
            font-size: 16px; outline: none; font-family: 'Arial', sans-serif;
        }
        #chat-input:disabled {
            opacity: 0.6;
            cursor: default;
        }

        /* Список игроков */
        #player-list {
            position: absolute; top: 0; right: 0; width: 180px;
            background: rgba(30, 30, 30, 0.9); border: 1px solid #000; color: white;
            border-bottom-left-radius: 6px;
        }
        .pl-head { background: linear-gradient(#555, #333); padding: 6px; text-align: center; font-weight: bold; }
        .pl-row { padding: 5px 10px; font-size: 14px; display: flex; justify-content: space-between; border-top: 1px solid #555; }
    </style>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="gui">
        <div id="player-list">
            <div class="pl-head">Players</div>
            <div class="pl-row">
                <span id="my-name-list">Guest</span> 
                <span style="color:lime">100</span>
            </div>
        </div>

        <div id="chat-history"></div>
        
        <div id="chat-bar">
            <div id="chat-label">Say:</div>
            <input id="chat-input" type="text" disabled>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Имя игрока ---
        const username = localStorage.getItem('ternix_user') || "Player1";
        
        function getNameColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
            return "#" + "00000".substring(0, 6 - c.length) + c;
        }
        const myColor = getNameColor(username);
        
        document.getElementById('my-name-list').innerText = username;
        document.getElementById('my-name-list').style.color = myColor;

        // --- Сцена ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Освещение
        scene.add(new THREE.AmbientLight(0x888888));
        const sun = new THREE.DirectionalLight(0xffffff, 1.3);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // --- Зеленый Baseplate ---
        const baseplateMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 }); // приятный зелёный
        const baseplate = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), baseplateMat);
        baseplate.rotation.x = -Math.PI / 2;
        scene.add(baseplate);

        // Сетка для ориентира (можно оставить)
        scene.add(new THREE.GridHelper(400, 100, 0x666666, 0x555555));

        // --- Игрок ---
        const player = new THREE.Group();
        scene.add(player);

        new GLTFLoader().load('Ternix.Guy.glb', (gltf) => {
            const model = gltf.scene;
            model.rotation.y = Math.PI; 
            player.add(model);
        }, undefined, () => {
            // Fallback Noob (если модель не загрузится)
            const matY = new THREE.MeshStandardMaterial({color:0xffff00});
            const matB = new THREE.MeshStandardMaterial({color:0x0000ff});
            const matG = new THREE.MeshStandardMaterial({color:0x00aa00});
            const head = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), matY); head.position.y=4.5;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2,2,1), matB); torso.position.y=3;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); lLeg.position.set(-0.5,1,0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); rLeg.position.set(0.5,1,0);
            player.add(head, torso, lLeg, rLeg);
        });

        // --- Управление ---
        let camDist = 20;
        let camYaw = 0, camPitch = 0.5;
        let isLeftDown = false;
        let velocityY = 0;
        let isGrounded = false;

        window.addEventListener('mousedown', e => { if(e.button===0) isLeftDown=true; });
        window.addEventListener('mouseup', e => { if(e.button===0) isLeftDown=false; });
        window.addEventListener('mousemove', e => {
            if(isLeftDown) {
                camYaw -= e.movementX * 0.005;
                camPitch -= e.movementY * 0.005;
                camPitch = Math.max(0.1, Math.min(1.5, camPitch));
            }
        });
        window.addEventListener('wheel', e => {
            camDist += e.deltaY * 0.05;
            camDist = Math.max(5, Math.min(50, camDist));
        });

        const keys = { w:false, a:false, s:false, d:false };
        
        document.addEventListener('keydown', e => {
            const chatInput = document.getElementById('chat-input');
            
            // Если чат активен (поле не disabled)
            if(!chatInput.disabled) {
                // В активном чате обрабатываем Enter и Escape
                if(e.code === 'Enter') {
                    e.preventDefault();  // Очень важно!
                    sendChat();
                }
                if(e.code === 'Escape') {
                    e.preventDefault();
                    deactivateChat();
                }
                return; // Другие клавиши не влияют на движение
            }

            // Чат неактивен — обрабатываем клавиши движения и открытие чата
            if(e.code === 'KeyW') keys.w = true;
            if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'KeyA') keys.a = true;
            if(e.code === 'KeyD') keys.d = true;
            
            if(e.code === 'Space' && isGrounded) {
                velocityY = 0.6;
                isGrounded = false;
            }
            
            if(e.code === 'Slash') {
                e.preventDefault();
                activateChat();
            }
        });
        
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') keys.w = false;
            if(e.code === 'KeyS') keys.s = false;
            if(e.code === 'KeyA') keys.a = false;
            if(e.code === 'KeyD') keys.d = false;
        });

        // --- Физика и анимация ---
        function animate() {
            requestAnimationFrame(animate);

            velocityY -= 0.025;
            player.position.y += velocityY;
            if(player.position.y <= 0) {
                player.position.y = 0;
                velocityY = 0;
                isGrounded = true;
            }

            const camDir = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw)).normalize();
            const camRight = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2)).normalize();
            
            const move = new THREE.Vector3(0,0,0);
            if(keys.w) move.sub(camDir);
            if(keys.s) move.add(camDir);
            if(keys.a) move.sub(camRight);
            if(keys.d) move.add(camRight);

            if(move.length() > 0) {
                player.position.addScaledVector(move.normalize(), 0.2);
                // Плавный поворот модели в сторону движения
                const targetAngle = Math.atan2(move.x, move.z);
                let diff = targetAngle - player.rotation.y;
                while(diff > Math.PI) diff -= Math.PI*2;
                while(diff < -Math.PI) diff += Math.PI*2;
                player.rotation.y += diff * 0.15;
            }

            // Камера
            const cx = player.position.x + camDist * Math.sin(camYaw) * Math.cos(camPitch);
            const cy = player.position.y + camDist * Math.sin(camPitch);
            const cz = player.position.z + camDist * Math.cos(camYaw) * Math.cos(camPitch);
            camera.position.set(cx, cy, cz);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 3, 0)));

            renderer.render(scene, camera);
        }
        animate();

        // --- Чат ---
        const chatInput = document.getElementById('chat-input');
        const chatHist = document.getElementById('chat-history');

        function activateChat() {
            chatInput.disabled = false;
            chatInput.focus();
            // Сброс движения, чтобы персонаж не продолжал идти после активации чата
            keys.w = keys.a = keys.s = keys.d = false;
        }
        
        function deactivateChat() {
            chatInput.disabled = true;
            chatInput.blur();
        }

        function sendChat() {
            const txt = chatInput.value.trim();
            if(txt) {
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerHTML = `<span style="color:${myColor}">[${username}]:</span> ${txt}`;
                chatHist.appendChild(msg);
                chatHist.scrollTop = chatHist.scrollHeight; // прокрутка вниз
            }
            chatInput.value = "";
            deactivateChat();
        }

        // Дополнительный обработчик на самом поле ввода для гарантированного перехвата Enter
        chatInput.addEventListener('keydown', (e) => {
            if(e.code === 'Enter') {
                e.preventDefault();  // обязательно!
                sendChat();
            }
        });

        // Ресайз окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Никаких системных сообщений
    </script>
</body>
</html>
