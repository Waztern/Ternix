<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Player (Fixed)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #chat-history {
            position: absolute; top: 10px; left: 10px; width: 500px; height: 300px;
            display: flex; flex-direction: column; justify-content: flex-end;
            overflow: hidden; font-size: 18px; font-weight: bold;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }
        .chat-msg { margin-bottom: 4px; color: white; }
        #chat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 32px;
            background: rgba(0, 0, 0, 0.8); border-top: 1px solid #666;
            pointer-events: auto; display: none; align-items: center;
        }
        #chat-bar.active { display: flex; }
        #chat-label { color: #00a2ff; font-weight: bold; padding: 0 10px; font-size: 14px; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        #player-list {
            position: absolute; top: 0; right: 0; width: 180px;
            background: rgba(30, 30, 30, 0.9); border: 1px solid #000; color: white;
        }
        .pl-row { padding: 5px 10px; font-size: 14px; display: flex; justify-content: space-between; }
    </style>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com", "three/addons/": "https://unpkg.com" } }
    </script>
</head>
<body>

    <div id="gui">
        <div id="player-list">
            <div style="background:#444; padding:5px; text-align:center;">Players</div>
            <div class="pl-row"><span id="my-name-list">Guest</span> <span style="color:lime">100</span></div>
        </div>
        <div id="chat-history"></div>
        <div id="chat-bar">
            <div id="chat-label">Say:</div>
            <input id="chat-input" type="text">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const username = localStorage.getItem('ternix_user') || "Player";
        const myColor = "#00a2ff";
        document.getElementById('my-name-list').innerText = username;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshStandardMaterial({ color: 0x4a4a4a }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(400, 100, 0x000000, 0x555555));

        // Предметы на карте
        const box = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshStandardMaterial({color:0xff0000}));
        box.position.set(10, 2, -10); scene.add(box);

        const player = new THREE.Group();
        scene.add(player);

        new GLTFLoader().load('Ternix.Guy.glb', (gltf) => {
            player.add(gltf.scene);
        }, undefined, () => {
            const head = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0xffff00}));
            head.position.y = 4; player.add(head);
        });

        let camDist = 20, camYaw = 0, camPitch = 0.5;
        let isRightBtn = false;
        const keys = { w:false, a:false, s:false, d:false };
        let vy = 0, onGround = true;

        // Вход в чат на "/"
        window.addEventListener('keydown', e => {
            if(document.activeElement.id === 'chat-input') {
                if(e.code === 'Enter') sendChat();
                if(e.code === 'Escape') closeChat();
                return;
            }
            if(e.code === 'Slash') { e.preventDefault(); openChat(); }
            if(e.code === 'KeyW') keys.w = true;
            if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'KeyA') keys.a = true;
            if(e.code === 'KeyD') keys.d = true;
            if(e.code === 'Space' && onGround) { vy = 0.6; onGround = false; }
        });

        window.addEventListener('keyup', e => {
            if(e.code === 'KeyW') keys.w = false;
            if(e.code === 'KeyS') keys.s = false;
            if(e.code === 'KeyA') keys.a = false;
            if(e.code === 'KeyD') keys.d = false;
        });

        window.addEventListener('mousedown', e => { if(e.button === 2 || e.button === 0) isRightBtn = true; });
        window.addEventListener('mouseup', () => isRightBtn = false);
        window.addEventListener('mousemove', e => {
            if(isRightBtn) { camYaw -= e.movementX * 0.005; camPitch = Math.max(0.1, Math.min(1.5, camPitch - e.movementY * 0.005)); }
        });

        function openChat() {
            document.getElementById('chat-bar').style.display = 'flex';
            document.getElementById('chat-input').focus();
            keys.w = keys.a = keys.s = keys.d = false;
        }

        function closeChat() {
            document.getElementById('chat-bar').style.display = 'none';
            document.getElementById('chat-input').blur();
            document.getElementById('chat-input').value = "";
        }

        function sendChat() {
            const text = document.getElementById('chat-input').value.trim();
            if(text) {
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerHTML = `<span style="color:${myColor}">[${username}]:</span> ${text}`;
                document.getElementById('chat-history').appendChild(msg);
            }
            closeChat();
        }

        function animate() {
            requestAnimationFrame(animate);

            vy -= 0.025;
            player.position.y += vy;
            if(player.position.y <= 0) { player.position.y = 0; vy = 0; onGround = true; }

            const move = new THREE.Vector3();
            const forward = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw));
            const right = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2));

            if(keys.w) move.sub(forward);
            if(keys.s) move.add(forward);
            if(keys.a) move.sub(right);
            if(keys.d) move.add(right);

            if(move.length() > 0) {
                move.normalize();
                player.position.addScaledVector(move, 0.2);
                // Плавный поворот к направлению движения
                const targetAngle = Math.atan2(move.x, move.z) + Math.PI;
                let diff = targetAngle - player.rotation.y;
                while(diff < -Math.PI) diff += Math.PI*2;
                while(diff > Math.PI) diff -= Math.PI*2;
                player.rotation.y += diff * 0.1;
            }

            camera.position.set(
                player.position.x + camDist * Math.sin(camYaw) * Math.cos(camPitch),
                player.position.y + camDist * Math.sin(camPitch) + 3,
                player.position.z + camDist * Math.cos(camYaw) * Math.cos(camPitch)
            );
            camera.lookAt(player.position.x, player.position.y + 3, player.position.z);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
