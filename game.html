<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Client (2014)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* --- CORE GUI 2014 --- */
        #gui-layer { position: absolute; inset: 0; pointer-events: none; }
        
        /* 1. CHAT (Top Left) */
        #chat-container {
            position: absolute; top: 5px; left: 5px; width: 350px; height: 200px;
            pointer-events: auto; display: flex; flex-direction: column;
        }
        #chat-history {
            flex: 1; background: rgba(0,0,0,0.4); overflow-y: auto; 
            color: white; font-size: 14px; padding: 5px; text-shadow: 1px 1px 0 #000;
            border-radius: 4px; margin-bottom: 2px;
        }
        #chat-input {
            background: rgba(0,0,0,0.6); border: 1px solid #777; color: white;
            padding: 5px; border-radius: 4px;
        }

        /* 2. PLAYER LIST (Top Right) */
        #player-list {
            position: absolute; top: 0; right: 20px; width: 160px;
            background: rgba(30, 30, 30, 0.8); color: white;
            font-size: 12px; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px;
        }
        .pl-header { background: rgba(50,50,50,0.9); padding: 5px; font-weight: bold; text-align: center; }
        .pl-entry { padding: 4px 8px; border-top: 1px solid #555; display: flex; justify-content: space-between; }

        /* 3. ESC MENU (Bottom Left Button) */
        #menu-btn {
            position: absolute; top: 0; left: 0; width: 30px; height: 30px;
            background: url('https://via.placeholder.com/30/0074bd/ffffff?text=M'); 
            cursor: pointer; pointer-events: auto; z-index: 999;
        }

        /* CLICK TO START OVERLAY */
        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center; 
            pointer-events: auto; cursor: pointer; color: white; font-size: 24px; font-weight: bold;
        }
    </style>
    <!-- Three.js + GLTFLoader from CDN -->
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <!-- GUI -->
    <div id="gui-layer">
        <!-- Chat -->
        <div id="chat-container">
            <div id="chat-history">
                <div style="color:#aaa;">System: Welcome to TerNix!</div>
            </div>
            <input id="chat-input" type="text" placeholder="Press '/' to chat">
        </div>

        <!-- Player List -->
        <div id="player-list">
            <div class="pl-header">Players</div>
            <div class="pl-entry" id="my-player-row">
                <span id="pl-name">Guest</span>
                <span style="color:lime;">100</span>
            </div>
        </div>
    </div>

    <!-- START OVERLAY -->
    <div id="overlay">CLICK TO PLAY</div>

    <!-- LOGIC -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 5; // Start high

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xcccccc);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 3. GROUND (Baseplate) ---
        const planeGeo = new THREE.PlaneGeometry(100, 100);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x555555 }); // Dark Grey Studs
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // --- 4. LOAD CHARACTER (Ternix.Guy.glb) ---
        const loader = new GLTFLoader();
        loader.load('Ternix.Guy.glb', function (gltf) {
            const model = gltf.scene;
            model.position.set(0, 0, -5); // Place in front of spawn
            model.scale.set(1, 1, 1);
            scene.add(model);
            addChat("System", "Character Model Loaded.");
        }, undefined, function (error) {
            console.error(error);
            addChat("Error", "Model not found. Check filename.");
        });

        // --- 5. CONTROLS (WASD) ---
        const controls = new PointerLockControls(camera, document.body);
        
        document.getElementById('overlay').addEventListener('click', () => {
            controls.lock();
            document.getElementById('overlay').style.display = 'none';
        });

        // Movement State
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();

        // Keys
        const onKeyDown = function (event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'Slash': document.getElementById('chat-input').focus(); break;
            }
        };
        const onKeyUp = function (event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- 6. USERNAME LINKING ---
        const savedUser = localStorage.getItem('ternix_username') || "Guest";
        document.getElementById('pl-name').innerText = savedUser;

        // --- 7. CHAT LOGIC ---
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && chatInput.value !== "") {
                addChat(savedUser, chatInput.value);
                chatInput.value = "";
                chatInput.blur(); // Return focus to game
            }
        });

        function addChat(name, text) {
            const div = document.createElement('div');
            div.innerHTML = `<b>[${name}]:</b> ${text}`;
            document.getElementById('chat-history').appendChild(div);
            document.getElementById('chat-history').scrollTop = 9999; // Auto scroll
        }

        // --- 8. GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                // Friction (Deceleration)
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // Direction
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // Acceleration
                if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

                // Apply
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
