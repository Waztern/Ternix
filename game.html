<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix — игра</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Verdana', sans-serif; user-select: none; background: #000; }
        
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        /* ===== СТИЛЬ 2014 (ПРЯМОУГОЛЬНЫЙ, БЕЗ СКРУГЛЕНИЙ) ===== */
        /* Верхняя панель */
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 36px;
            background: #1e1e1e; color: white; font-size: 14px; font-weight: bold;
            border-bottom: 2px solid #000;
            display: flex; align-items: center; padding: 0 10px;
            pointer-events: auto;
            box-sizing: border-box;
        }
        #exit-btn {
            background: #d32f2f; color: white; font-weight: bold;
            padding: 4px 12px; border: 2px solid #8b0000;
            cursor: pointer; margin-right: auto;
        }
        #exit-btn:hover { background: #b71c1c; }
        .currency {
            display: flex; gap: 20px; margin-left: auto;
        }
        .currency span {
            background: #333; padding: 4px 8px; border: 1px solid #777;
        }

        /* Здоровье (зелёная полоса под верхней панелью) */
        #health-container {
            position: absolute; top: 40px; left: 10px; width: 200px; height: 20px;
            background: #222; border: 2px solid #000;
            pointer-events: auto;
        }
        #health-bar {
            height: 100%; width: 100%; background: #2e7d32;
        }

        /* Список игроков (жёлтый, справа) */
        #player-list {
            position: absolute; top: 40px; right: 10px; width: 160px;
            background: #ffd700; border: 2px solid #b8860b;
            color: #000; font-weight: bold;
            pointer-events: auto;
        }
        .pl-head {
            background: #cc8400; padding: 4px; text-align: center; font-size: 14px;
            border-bottom: 2px solid #8b5a00;
        }
        .pl-row {
            padding: 4px 8px; font-size: 13px; border-bottom: 1px solid #b8860b;
        }
        .pl-row:last-child { border-bottom: none; }

        /* Чат (синий, внизу слева) */
        #chat-panel {
            position: absolute; bottom: 10px; left: 10px; width: 500px;
            background: #1e4f8a; border: 2px solid #0a2f6a;
            padding: 5px; pointer-events: auto;
        }
        #chat-history {
            height: 160px; overflow-y: auto; background: #0a1f3a;
            border: 1px solid #000; padding: 4px;
            color: white; font-weight: bold; font-size: 13px;
        }
        .chat-msg { margin: 2px 0; }
        #chat-input-area {
            display: flex; margin-top: 5px;
        }
        #chat-label {
            background: #0a2f6a; color: white; font-weight: bold;
            padding: 4px 8px; border: 1px solid #000; border-right: none;
            white-space: nowrap;
        }
        #chat-input {
            flex: 1; background: white; border: 1px solid #000;
            padding: 4px 6px; font-size: 13px; outline: none;
            font-family: 'Verdana', sans-serif;
        }
        #chat-input:disabled { background: #ccc; }

        /* Надпись "Make by: Waztern" */
        #credits {
            position: absolute; bottom: 10px; right: 10px;
            background: #333; color: white; font-size: 11px;
            padding: 2px 6px; border: 1px solid #777;
        }
    </style>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="gui">
        <div id="top-bar">
            <div id="exit-btn">Exit</div>
            <div class="currency">
                <span id="firens">Firens: 0</span>
                <span id="nex">Nex: 100</span>
            </div>
        </div>

        <div id="health-container">
            <div id="health-bar"></div>
        </div>

        <div id="player-list">
            <div class="pl-head">Players</div>
            <div class="pl-row" id="my-name-row">Загрузка...</div>
        </div>

        <div id="chat-panel">
            <div id="chat-history">
                <!-- Пример сообщений (потом будут добавляться динамически) -->
                <div class="chat-msg"><span style="color:#ffaa00">[waztern]:</span> hi</div>
                <div class="chat-msg"><span style="color:#00ff00">[Player1]:</span> привет</div>
            </div>
            <div id="chat-input-area">
                <div id="chat-label">To chat click here or press "/" key</div>
                <input id="chat-input" type="text" disabled>
            </div>
        </div>

        <div id="credits">Make by: Waztern</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Валюты из localStorage ---
        function getFirens() { return parseInt(localStorage.getItem('ternix_firens') || '0'); }
        function getNex() { return parseInt(localStorage.getItem('ternix_nex') || '100'); }
        function setFirens(value) { localStorage.setItem('ternix_firens', value); document.getElementById('firens').innerText = `Firens: ${value}`; }
        function setNex(value) { localStorage.setItem('ternix_nex', value); document.getElementById('nex').innerText = `Nex: ${value}`; }

        setFirens(getFirens());
        setNex(getNex());

        // --- Имя игрока ---
        const username = localStorage.getItem('ternix_user') || "Player1";
        function getNameColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
            return "#" + "00000".substring(0, 6 - c.length) + c;
        }
        const myColor = getNameColor(username);
        document.getElementById('my-name-row').innerText = username;

        // --- Кнопка Exit ---
        document.getElementById('exit-btn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // --- Сцена THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x888888));
        const sun = new THREE.DirectionalLight(0xffffff, 1.3);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // Пол (зелёный baseplate)
        const baseplateMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const baseplate = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), baseplateMat);
        baseplate.rotation.x = -Math.PI / 2;
        scene.add(baseplate);

        // Сетка для ориентира (можно оставить)
        scene.add(new THREE.GridHelper(400, 100, 0x666666, 0x555555));

        // --- Игрок (модель) ---
        const player = new THREE.Group();
        scene.add(player);

        new GLTFLoader().load('Ternix.Guy.glb', (gltf) => {
            const model = gltf.scene;
            // Подстройка начального поворота (зависит от модели)
            model.rotation.y = Math.PI; // если модель смотрит в сторону -Z
            player.add(model);
        }, undefined, () => {
            // Заглушка-кубик
            const matY = new THREE.MeshStandardMaterial({color:0xffff00});
            const matB = new THREE.MeshStandardMaterial({color:0x0000ff});
            const matG = new THREE.MeshStandardMaterial({color:0x00aa00});
            const head = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), matY); head.position.y=4.5;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2,2,1), matB); torso.position.y=3;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); lLeg.position.set(-0.5,1,0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); rLeg.position.set(0.5,1,0);
            player.add(head, torso, lLeg, rLeg);
        });

        // --- Управление: W/S поворачивают, A/D только движение вбок ---
        let camDist = 20;
        let camYaw = 0, camPitch = 0.5;
        let isLeftDown = false;
        let velocityY = 0;
        let isGrounded = false;

        window.addEventListener('mousedown', e => { if(e.button===0) isLeftDown=true; });
        window.addEventListener('mouseup', e => { if(e.button===0) isLeftDown=false; });
        window.addEventListener('mousemove', e => {
            if(isLeftDown) {
                camYaw -= e.movementX * 0.005;
                camPitch -= e.movementY * 0.005;
                camPitch = Math.max(0.1, Math.min(1.5, camPitch));
            }
        });
        window.addEventListener('wheel', e => {
            camDist += e.deltaY * 0.05;
            camDist = Math.max(5, Math.min(50, camDist));
        });

        const keys = { w:false, a:false, s:false, d:false };
        
        document.addEventListener('keydown', e => {
            const chatInput = document.getElementById('chat-input');
            
            // Если чат активен
            if(!chatInput.disabled) {
                if(e.code === 'Enter') {
                    e.preventDefault();
                    sendChat();
                }
                if(e.code === 'Escape') {
                    e.preventDefault();
                    deactivateChat();
                }
                return;
            }

            // Движение
            if(e.code === 'KeyW') keys.w = true;
            if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'KeyA') keys.a = true;
            if(e.code === 'KeyD') keys.d = true;
            
            if(e.code === 'Space' && isGrounded) {
                velocityY = 0.6;
                isGrounded = false;
            }
            
            if(e.code === 'Slash') {
                e.preventDefault();
                activateChat();
            }
        });
        
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') keys.w = false;
            if(e.code === 'KeyS') keys.s = false;
            if(e.code === 'KeyA') keys.a = false;
            if(e.code === 'KeyD') keys.d = false;
        });

        function animate() {
            requestAnimationFrame(animate);

            // Гравитация
            velocityY -= 0.025;
            player.position.y += velocityY;
            if(player.position.y <= 0) {
                player.position.y = 0;
                velocityY = 0;
                isGrounded = true;
            }

            // Направления относительно камеры
            const camDir = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw)).normalize();
            const camRight = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2)).normalize();
            
            const move = new THREE.Vector3(0,0,0);
            if(keys.w) move.add(camDir);
            if(keys.s) move.sub(camDir);
            if(keys.a) move.sub(camRight);
            if(keys.d) move.add(camRight);

            // Если есть движение, применяем его
            if(move.length() > 0) {
                player.position.addScaledVector(move.normalize(), 0.2);
                
                // Поворачиваем персонажа ТОЛЬКО если есть движение вперёд/назад (W/S)
                // и нет движения влево/вправо (чтобы при чистом A/D не поворачивался)
                if ((keys.w || keys.s) && !(keys.a || keys.d)) {
                    const targetAngle = Math.atan2(move.x, move.z);
                    let diff = targetAngle - player.rotation.y;
                    while(diff > Math.PI) diff -= Math.PI*2;
                    while(diff < -Math.PI) diff += Math.PI*2;
                    player.rotation.y += diff * 0.15;
                }
                // Если зажаты и W/S и A/D одновременно, то move будет диагональным,
                // но персонаж повернётся в сторону диагонали — это тоже допустимо.
                // Можно оставить как есть или добавить условие.
                // Для чистоты: если есть и W/S, и A/D, поворачиваем в сторону диагонали.
                else if (keys.w || keys.s) {
                    const targetAngle = Math.atan2(move.x, move.z);
                    let diff = targetAngle - player.rotation.y;
                    while(diff > Math.PI) diff -= Math.PI*2;
                    while(diff < -Math.PI) diff += Math.PI*2;
                    player.rotation.y += diff * 0.15;
                }
            }

            // Камера
            const cx = player.position.x + camDist * Math.sin(camYaw) * Math.cos(camPitch);
            const cy = player.position.y + camDist * Math.sin(camPitch);
            const cz = player.position.z + camDist * Math.cos(camYaw) * Math.cos(camPitch);
            camera.position.set(cx, cy, cz);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 3, 0)));

            renderer.render(scene, camera);
        }
        animate();

        // --- Чат ---
        const chatInput = document.getElementById('chat-input');
        const chatHist = document.getElementById('chat-history');

        function activateChat() {
            chatInput.disabled = false;
            chatInput.focus();
            keys.w = keys.a = keys.s = keys.d = false;
        }
        
        function deactivateChat() {
            chatInput.disabled = true;
            chatInput.blur();
        }

        function sendChat() {
            const txt = chatInput.value.trim();
            if(txt) {
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerHTML = `<span style="color:${myColor}">[${username}]:</span> ${txt}`;
                chatHist.appendChild(msg);
                chatHist.scrollTop = chatHist.scrollHeight;
            }
            chatInput.value = "";
            // Чат остаётся активным
        }

        chatInput.addEventListener('keydown', (e) => {
            if(e.code === 'Enter') {
                e.preventDefault();
                sendChat();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
