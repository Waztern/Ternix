<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Player (Final Fix)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; background: #000; }
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #chat-history {
            position: absolute; top: 10px; left: 10px; width: 500px; height: 350px;
            display: flex; flex-direction: column; justify-content: flex-end;
            overflow: hidden; font-size: 18px; font-weight: bold;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }
        .chat-msg { margin-bottom: 4px; color: white; }
        #chat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 32px;
            background: rgba(0, 0, 0, 0.8); border-top: 1px solid #666;
            pointer-events: auto; display: none; align-items: center;
        }
        #chat-bar.active { display: flex; }
        #chat-label { color: #00a2ff; font-weight: bold; padding: 0 10px; font-size: 14px; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        #player-list {
            position: absolute; top: 0; right: 0; width: 180px;
            background: rgba(30, 30, 30, 0.9); border: 1px solid #000; color: white;
        }
        .pl-row { padding: 5px 10px; font-size: 14px; display: flex; justify-content: space-between; }
    </style>

    <!-- ПОДКЛЮЧАЕМ БИБЛИОТЕКИ ЧЕРЕЗ HTTPS -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body>

    <div id="gui">
        <div id="player-list">
            <div style="background:#444; padding:5px; text-align:center;">Players</div>
            <div class="pl-row"><span id="my-name-list">Guest</span> <span style="color:lime">100</span></div>
        </div>
        <div id="chat-history"></div>
        <div id="chat-bar">
            <div id="chat-label">Say:</div>
            <input id="chat-input" type="text" autocomplete="off">
        </div>
    </div>

    <script>
        // ЖДЕМ ПОЛНОЙ ЗАГРУЗКИ БИБЛИОТЕК
        window.onload = function() {
            if (typeof THREE === 'undefined') {
                alert("Three.js не загрузился! Попробуй отключить блокировщик рекламы или сменить браузер.");
                return;
            }

            const username = localStorage.getItem('ternix_user') || "Player1";
            const myColor = "#00a2ff";
            document.getElementById('my-name-list').innerText = username;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            // ПОЛ И ДЕКОР
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshStandardMaterial({ color: 0x4a4a4a }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            scene.add(new THREE.GridHelper(400, 100, 0x000000, 0x555555));

            const box = new THREE.Mesh(new THREE.BoxGeometry(5,5,5), new THREE.MeshStandardMaterial({color: 0xff0000}));
            box.position.set(20, 2.5, -20); scene.add(box);

            const player = new THREE.Group();
            scene.add(player);

            // ЗАГРУЗКА
            const loader = new THREE.GLTFLoader();
            loader.load('Ternix.Guy.glb', (gltf) => {
                player.add(gltf.scene);
            }, undefined, () => {
                const head = new THREE.Mesh(new THREE.BoxGeometry(1.2,1.2,1.2), new THREE.MeshStandardMaterial({color:0xffff00}));
                head.position.y = 4; player.add(head);
                const body = new THREE.Mesh(new THREE.BoxGeometry(2,2,1), new THREE.MeshStandardMaterial({color:0x0000ff}));
                body.position.y = 2.5; player.add(body);
            });

            let camDist = 20, camYaw = 0, camPitch = 0.5, isMouseDown = false, vy = 0, onGround = true;
            const keys = { w:0, a:0, s:0, d:0 };

            // УПРАВЛЕНИЕ
            window.addEventListener('mousedown', () => isMouseDown = true);
            window.addEventListener('mouseup', () => isMouseDown = false);
            window.addEventListener('mousemove', e => {
                if(isMouseDown) { camYaw -= e.movementX * 0.007; camPitch = Math.max(0.1, Math.min(1.4, camPitch - e.movementY * 0.007)); }
            });

            const chatIn = document.getElementById('chat-input');
            const chatBar = document.getElementById('chat-bar');

            window.addEventListener('keydown', e => {
                if(document.activeElement === chatIn) {
                    if(e.code === 'Enter') sendChat();
                    if(e.code === 'Escape') closeChat();
                    return;
                }
                if(e.code === 'KeyW') keys.w = 1; if(e.code === 'KeyS') keys.s = 1;
                if(e.code === 'KeyA') keys.a = 1; if(e.code === 'KeyD') keys.d = 1;
                if(e.code === 'Space' && onGround) { vy = 0.6; onGround = false; }
                if(e.code === 'Slash') { e.preventDefault(); chatBar.style.display = 'flex'; chatIn.focus(); keys.w=keys.a=keys.s=keys.d=0; }
            });

            window.addEventListener('keyup', e => {
                if(e.code === 'KeyW') keys.w = 0; if(e.code === 'KeyS') keys.s = 0;
                if(e.code === 'KeyA') keys.a = 0; if(e.code === 'KeyD') keys.d = 0;
            });

            function sendChat() {
                const val = chatIn.value.trim();
                if(val) {
                    const m = document.createElement('div'); m.className = 'chat-msg';
                    m.innerHTML = `<span style="color:${myColor}">[${username}]:</span> ${val}`;
                    document.getElementById('chat-history').appendChild(m);
                }
                closeChat();
            }
            function closeChat() { chatBar.style.display = 'none'; chatIn.blur(); chatIn.value = ""; }

            function animate() {
                requestAnimationFrame(animate);
                vy -= 0.025; player.position.y += vy;
                if(player.position.y < 0) { player.position.y = 0; vy = 0; onGround = true; }

                const move = new THREE.Vector3();
                const forward = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw));
                const right = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2));

                if(keys.w) move.sub(forward); if(keys.s) move.add(forward);
                if(keys.a) move.sub(right); if(keys.d) move.add(right);

                if(move.length() > 0) {
                    move.normalize();
                    player.position.addScaledVector(move, 0.25);
                    const targetAngle = Math.atan2(move.x, move.z) + Math.PI;
                    let diff = targetAngle - player.rotation.y;
                    while(diff < -Math.PI) diff += Math.PI*2;
                    while(diff > Math.PI) diff -= Math.PI*2;
                    player.rotation.y += diff * 0.15;
                }

                camera.position.set(
                    player.position.x + Math.sin(camYaw) * camDist * Math.cos(camPitch),
                    player.position.y + Math.sin(camPitch) * camDist + 3,
                    player.position.z + Math.cos(camYaw) * camDist * Math.cos(camPitch)
                );
                camera.lookAt(player.position.x, player.position.y + 3, player.position.z);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
