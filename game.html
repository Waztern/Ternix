<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Player (2014 Legacy)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* --- ИНТЕРФЕЙС (GUI) --- */
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        /* 1. ЧАТ: ИСТОРИЯ (Слева Сверху) */
        #chat-history {
            position: absolute; top: 20px; left: 20px; width: 400px; height: 250px;
            overflow-y: hidden; display: flex; flex-direction: column; justify-content: flex-end;
            /* Стиль 2014: Прозрачный фон, Белый текст, Черная обводка */
            color: white; font-weight: bold; font-size: 18px;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000;
            line-height: 1.3;
        }

        /* 2. ЧАТ: ВВОД (Снизу во весь экран) */
        #chat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30px;
            background: rgba(0, 0, 0, 0.6); border-top: 1px solid #555;
            pointer-events: auto; display: flex; align-items: center;
        }
        #chat-bar input {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 14px; padding: 0 10px; outline: none; font-family: 'Verdana', sans-serif;
        }
        /* Скрываем полосу, если не пишем (опционально, в 2014 она часто была видна) */
        #chat-bar.hidden { display: none; }

        /* 3. СПИСОК ИГРОКОВ (Справа Сверху) */
        #player-list {
            position: absolute; top: 0; right: 20px; width: 160px;
            background: rgba(20, 20, 20, 0.8); border: 1px solid #555;
            color: white; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px;
        }
        .pl-head { background: rgba(50, 50, 50, 0.9); padding: 5px; text-align: center; font-weight: bold; font-size: 13px; }
        .pl-row { padding: 5px; font-size: 13px; display: flex; justify-content: space-between; border-top: 1px solid #444; }

    </style>
    
    <!-- THREE.JS (Графический движок) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- GUI -->
    <div id="gui">
        <div id="player-list">
            <div class="pl-head">Players</div>
            <div class="pl-row">
                <span id="my-name">Guest</span> <span style="color:lime">100</span>
            </div>
        </div>

        <div id="chat-history">
            <div>System: Welcome to TerNix!</div>
        </div>
        
        <div id="chat-bar">
            <span style="color:#aaa; padding-left:5px; font-size:12px;">[To All]:</span>
            <input id="chat-input" type="text" placeholder="Press '/' to chat here...">
        </div>
    </div>

    <!-- СКРИПТ ИГРЫ -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. НАСТРОЙКИ ---
        const username = localStorage.getItem('ternix_user') || "Guest";
        document.getElementById('my-name').innerText = username;

        // --- 2. СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо Roblox
        scene.fog = new THREE.Fog(0x87CEEB, 30, 100); // Туман

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Свет
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 50, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Пол (Baseplate)
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444 }); // Темно-серые студы
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        
        // Сетка для ориентира
        const grid = new THREE.GridHelper(200, 50, 0x666666, 0x555555);
        scene.add(grid);

        // --- 3. ИГРОК ---
        const playerGroup = new THREE.Group();
        playerGroup.position.set(0, 0, 0);
        scene.add(playerGroup);

        // Загрузка модели или создание Нуба
        const loader = new GLTFLoader();
        loader.load('Ternix.Guy.glb', 
            (gltf) => {
                const model = gltf.scene;
                model.rotation.y = Math.PI; // Разворачиваем модель лицом к камере
                playerGroup.add(model);
            }, 
            undefined, 
            (err) => {
                console.log("Модель не найдена, создаем Classic Noob");
                createNoob(); 
            }
        );

        function createNoob() {
            // Геометрия R6 (Классика)
            const head = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: 0xffff00}));
            head.position.y = 4.5;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2,2,1), new THREE.MeshStandardMaterial({color: 0x0000ff}));
            torso.position.y = 3;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.9,2,1), new THREE.MeshStandardMaterial({color: 0x00aa00}));
            lLeg.position.set(-0.5, 1, 0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.9,2,1), new THREE.MeshStandardMaterial({color: 0x00aa00}));
            rLeg.position.set(0.5, 1, 0);
            
            playerGroup.add(head, torso, lLeg, rLeg);
        }

        // --- 4. УПРАВЛЕНИЕ (Roblox Style) ---
        // Переменные камеры
        let camDist = 12;
        let camPitch = 20 * (Math.PI/180); // Угол наклона
        let camYaw = 0; // Угол поворота (вокруг игрока)
        
        // Мышь
        let isRightDown = false;
        let prevMouseX = 0;
        let prevMouseY = 0;

        window.addEventListener('mousedown', (e) => { if(e.button === 2) isRightDown = true; });
        window.addEventListener('mouseup', (e) => { if(e.button === 2) isRightDown = false; });
        window.addEventListener('contextmenu', e => e.preventDefault()); // Блок меню ПКМ

        window.addEventListener('mousemove', (e) => {
            if(isRightDown) {
                const deltaX = e.clientX - prevMouseX;
                const deltaY = e.clientY - prevMouseY;
                
                camYaw -= deltaX * 0.005; // Вращение влево/вправо
                camPitch += deltaY * 0.005; // Вращение вверх/вниз
                
                // Ограничение камеры (чтобы не уходила под землю)
                camPitch = Math.max(0.1, Math.min(Math.PI/2 - 0.1, camPitch));
            }
            prevMouseX = e.clientX;
            prevMouseY = e.clientY;
        });
        
        // Зум (Колесико)
        window.addEventListener('wheel', (e) => {
            camDist += e.deltaY * 0.01;
            camDist = Math.max(5, Math.min(50, camDist));
        });

        // Клавиши (WASD)
        const keys = { w: false, a: false, s: false, d: false };
        
        document.addEventListener('keydown', (e) => {
            if(document.activeElement === document.getElementById('chat-input')) return; // Если пишем в чат - не ходить
            
            if(e.key === 'w' || e.key === 'W') keys.w = true;
            if(e.key === 's' || e.key === 'S') keys.s = true;
            if(e.key === 'a' || e.key === 'A') keys.a = true;
            if(e.key === 'd' || e.key === 'D') keys.d = true;
            
            // Чат активация
            if(e.key === '/') {
                e.preventDefault();
                document.getElementById('chat-input').focus();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if(e.key === 'w' || e.key === 'W') keys.w = false;
            if(e.key === 's' || e.key === 'S') keys.s = false;
            if(e.key === 'a' || e.key === 'A') keys.a = false;
            if(e.key === 'd' || e.key === 'D') keys.d = false;
        });

        // --- 5. ГЛАВНЫЙ ЦИКЛ (PHYSICS LOOP) ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Движение Игрока
            // Вектор направления камеры (на плоскости XZ)
            const camDir = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw)).normalize();
            const camRight = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2)).normalize();
            
            const moveVec = new THREE.Vector3(0, 0, 0);
            if(keys.w) moveVec.sub(camDir); // Вперед (в сторону взгляда)
            if(keys.s) moveVec.add(camDir); // Назад
            if(keys.a) moveVec.sub(camRight); // Влево
            if(keys.d) moveVec.add(camRight); // Вправо

            if (moveVec.length() > 0) {
                moveVec.normalize();
                playerGroup.position.addScaledVector(moveVec, 0.15); // Скорость бега
                
                // Поворот персонажа в сторону бега
                const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                // Плавный поворот (Lerp)
                let rotDiff = targetAngle - playerGroup.rotation.y;
                // Нормализация угла (чтобы не крутился на 360 лишний раз)
                while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
                while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
                playerGroup.rotation.y += rotDiff * 0.2; 
            }

            // 2. Обновление Камеры
            // Камера всегда смотрит на игрока + смещение по углу Yaw/Pitch
            const camX = playerGroup.position.x + camDist * Math.sin(camYaw) * Math.cos(camPitch);
            const camY = playerGroup.position.y + camDist * Math.sin(camPitch);
            const camZ = playerGroup.position.z + camDist * Math.cos(camYaw) * Math.cos(camPitch);
            
            camera.position.set(camX, camY, camZ);
            camera.lookAt(playerGroup.position.clone().add(new THREE.Vector3(0, 2, 0))); // Смотрим чуть выше центра

            renderer.render(scene, camera);
        }
        animate();

        // --- 6. ЧАТ ЛОГИКА ---
        const chatIn = document.getElementById('chat-input');
        chatIn.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && chatIn.value !== "") {
                const msg = document.createElement('div');
                // Формат: [Name]: Message
                msg.innerHTML = `<span style="color:#3b88c3;">[${username}]</span>: ${chatIn.value}`;
                document.getElementById('chat-history').appendChild(msg);
                chatIn.value = "";
                chatIn.blur(); // Убрать фокус, чтобы снова ходить на WASD
            }
        });

        // Ресайз окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
