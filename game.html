<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Player</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        
        /* --- GUI 2014 --- */
        #gui { position: absolute; inset: 0; pointer-events: none; }
        
        /* ЧАТ (НИЖНИЙ БАР) */
        #chat-bar-container {
            position: absolute; bottom: 20px; left: 20px; 
            width: 300px; pointer-events: auto;
        }
        #chat-history {
            height: 150px; overflow-y: auto; 
            color: white; font-weight: bold; font-size: 14px;
            text-shadow: 1px 1px 0 #000; margin-bottom: 5px;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        /* Полоса ввода */
        #chat-input-line {
            display: flex; background: rgba(0,0,0,0.5); border: 1px solid #777;
        }
        #chat-label {
            color: white; background: #333; padding: 5px; font-size: 12px; font-weight: bold;
        }
        #chat-input {
            flex: 1; background: transparent; border: none; color: white; padding: 5px; outline: none;
        }

        /* СПИСОК ИГРОКОВ */
        #player-list {
            position: absolute; top: 0; right: 20px; width: 150px;
            background: rgba(30,30,30,0.8); color: white;
            border-bottom-left-radius: 5px; border-bottom-right-radius: 5px;
        }
        .pl-head { text-align: center; font-weight: bold; padding: 5px; background: rgba(50,50,50,0.9); }
        .pl-item { padding: 4px; display: flex; justify-content: space-between; font-size: 12px; border-top: 1px solid #555; }
    </style>
    
    <!-- ИМПОРТ THREE.JS И ОРБИТ КОНТРОЛЛЕРОВ -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="gui">
        <div id="player-list">
            <div class="pl-head">Players</div>
            <div class="pl-item">
                <span id="my-name">Guest</span> <span style="color:lime">100</span>
            </div>
        </div>

        <div id="chat-bar-container">
            <div id="chat-history">
                <div style="color:#aaa">System: Welcome to TerNix!</div>
            </div>
            <div id="chat-input-line">
                <div id="chat-label">Say:</div>
                <input id="chat-input" type="text">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. ИНИЦИАЛИЗАЦИЯ
        const username = localStorage.getItem('ternix_user') || "Guest";
        document.getElementById('my-name').innerText = username;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо
        scene.fog = new THREE.Fog(0x87CEEB, 20, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 15); // Камера высоко сзади

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. СВЕТ И ПОЛ
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const grid = new THREE.GridHelper(200, 50, 0x555555, 0x555555);
        scene.add(grid);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ color: 0x333333 }));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // 3. ПЕРСОНАЖ (Контейнер)
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // ПОПЫТКА ЗАГРУЗИТЬ GLB ИЛИ СОЗДАТЬ НУБА
        const loader = new GLTFLoader();
        loader.load('Ternix.Guy.glb', 
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(1, 1, 1);
                model.rotation.y = Math.PI; // Разворот если нужно
                playerGroup.add(model);
            }, 
            undefined, 
            (err) => {
                console.log("Модель не найдена, создаем Нуба");
                createNoob(); // Если модель не найдена - делаем нуба
            }
        );

        function createNoob() {
            // Простой Roblox Noob (R6 style)
            const matYellow = new THREE.MeshStandardMaterial({ color: 0xffff00 }); // Голова
            const matBlue = new THREE.MeshStandardMaterial({ color: 0x0000ff });   // Тело
            const matGreen = new THREE.MeshStandardMaterial({ color: 0x00ff00 });  // Ноги

            const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), matYellow);
            head.position.y = 4.6;
            
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 1), matBlue);
            torso.position.y = 3;

            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.9, 2, 1), matGreen);
            lLeg.position.set(-0.5, 1, 0);
            
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.9, 2, 1), matGreen);
            rLeg.position.set(0.5, 1, 0);

            playerGroup.add(head, torso, lLeg, rLeg);
        }

        // 4. КАМЕРА ORBIT (Важно!)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.minDistance = 5;
        controls.maxDistance = 50;
        controls.target = playerGroup.position; // Камера смотрит на игрока
        
        // Настройка кнопок мыши как в Roblox
        // ЛКМ = Ничего (или клик), ПКМ = Вращение
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.PAN, // Можно поменять
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.ROTATE
        };

        // 5. УПРАВЛЕНИЕ WASD (ОТНОСИТЕЛЬНО КАМЕРЫ)
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            if(document.activeElement === document.getElementById('chat-input')) return;
            if(e.key.toLowerCase() === 'w') keys.w = true;
            if(e.key.toLowerCase() === 'a') keys.a = true;
            if(e.key.toLowerCase() === 's') keys.s = true;
            if(e.key.toLowerCase() === 'd') keys.d = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.key.toLowerCase() === 'w') keys.w = false;
            if(e.key.toLowerCase() === 'a') keys.a = false;
            if(e.key.toLowerCase() === 's') keys.s = false;
            if(e.key.toLowerCase() === 'd') keys.d = false;
        });

        function updateMovement(delta) {
            if (!keys.w && !keys.s && !keys.a && !keys.d) return;

            // Вектор направления камеры (только по горизонту)
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            camDir.y = 0;
            camDir.normalize();

            // Вектор "вправо" от камеры
            const camRight = new THREE.Vector3();
            camRight.crossVectors(camDir, new THREE.Vector3(0, 1, 0)); // X
            
            const moveVec = new THREE.Vector3(0, 0, 0);

            if (keys.w) moveVec.add(camDir);
            if (keys.s) moveVec.sub(camDir);
            if (keys.d) moveVec.add(camRight);
            if (keys.a) moveVec.sub(camRight);

            if (moveVec.length() > 0) {
                moveVec.normalize();
                const speed = 10 * delta; // Скорость бега
                
                // Двигаем игрока
                playerGroup.position.addScaledVector(moveVec, speed);
                
                // Поворачиваем лицо игрока туда, куда бежим
                const targetRotation = Math.atan2(moveVec.x, moveVec.z);
                // Плавный поворот
                playerGroup.rotation.y = targetRotation;
            }
            
            // Обновляем цель камеры, чтобы она летела за игроком
            controls.target.copy(playerGroup.position);
            controls.target.y += 2; // Смотреть чуть выше
        }

        // 6. ЧАТ
        const chatIn = document.getElementById('chat-input');
        chatIn.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && chatIn.value !== "") {
                const msg = document.createElement('div');
                msg.innerText = `[${username}]: ${chatIn.value}`;
                document.getElementById('chat-history').appendChild(msg);
                document.getElementById('chat-history').scrollTop = 9999;
                chatIn.value = "";
            }
        });

        // 7. ЛУП
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            updateMovement(delta);
            controls.update(); // Обновляем камеру
            
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
