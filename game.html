<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Client - 2014 Legacy</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* --- ИНТЕРФЕЙС 2014 --- */
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        /* 1. ИСТОРИЯ ЧАТА (Слева сверху, без фона) */
        #chat-history {
            position: absolute; top: 5px; left: 5px; width: 500px; height: 300px;
            display: flex; flex-direction: column; justify-content: flex-end;
            overflow: hidden;
            font-size: 16px; color: white; 
            /* Жесткая черная обводка (Legacy стиль) */
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }
        .chat-msg { margin-bottom: 2px; padding-left: 5px; }

        /* 2. ПОЛОСА ВВОДА (Снизу, во всю ширину) */
        #chat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 28px;
            background: rgba(0, 0, 0, 0.7); /* Темная полоса */
            border-top: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto; display: flex; align-items: center;
            transition: opacity 0.2s;
        }
        #chat-label {
            color: #ccc; font-size: 12px; padding: 0 10px; font-weight: bold;
        }
        #chat-input {
            flex: 1; background: transparent; border: none; color: white; 
            font-size: 14px; outline: none; font-family: 'Arial', sans-serif;
        }

        /* 3. ЛИДЕРБОРД (Справа сверху) */
        #player-list {
            position: absolute; top: 0; right: 0; width: 180px;
            background: rgba(30, 30, 30, 0.8); color: white;
            border-bottom-left-radius: 5px;
        }
        .pl-head { 
            background: linear-gradient(#555, #333); padding: 6px; 
            text-align: center; font-weight: bold; font-size: 12px; border-bottom: 1px solid #000;
        }
        .pl-row { 
            padding: 4px 8px; font-size: 12px; display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.3); margin-bottom: 1px;
        }
        
        /* СКРЫТЬ КУРСОР КОГДА КРУТИШЬ КАМЕРУ */
        body.rotating { cursor: none; }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- GUI -->
    <div id="gui">
        <div id="player-list">
            <div class="pl-head">Players</div>
            <div class="pl-row">
                <span id="my-name">Guest</span> <span style="color:#0f0">100</span>
            </div>
        </div>

        <div id="chat-history">
            <!-- Сюда падают сообщения -->
        </div>
        
        <div id="chat-bar">
            <div id="chat-label">To Chat:</div>
            <input id="chat-input" type="text" placeholder="Click here or press '/' to chat">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. НАСТРОЙКИ ---
        const username = localStorage.getItem('ternix_user') || "Player1";
        document.getElementById('my-name').innerText = username;

        // --- 2. СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Классическое небо
        scene.fog = new THREE.Fog(0x87CEEB, 40, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Свет
        const ambLight = new THREE.AmbientLight(0x888888);
        scene.add(ambLight);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun);

        // Baseplate
        const plate = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x4a4a4a }));
        plate.rotation.x = -Math.PI / 2;
        scene.add(plate);
        
        // Сетка (Студы)
        const grid = new THREE.GridHelper(500, 125, 0x555555, 0x555555);
        scene.add(grid);

        // --- 3. ИГРОК ---
        const player = new THREE.Group();
        scene.add(player);

        // Загрузчик модели
        const loader = new GLTFLoader();
        loader.load('Ternix.Guy.glb', (gltf) => {
            const model = gltf.scene;
            model.rotation.y = Math.PI; // Разворот лица
            player.add(model);
        }, undefined, () => {
            // ФОЛЛБЭК: Если модели нет, делаем "Classic Noob"
            const head = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0xffff00})); head.position.y=4.5;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2,2,1), new THREE.MeshStandardMaterial({color:0x0000ff})); torso.position.y=3;
            const lleg = new THREE.Mesh(new THREE.BoxGeometry(0.9,2,1), new THREE.MeshStandardMaterial({color:0x00aa00})); lleg.position.set(-0.5,1,0);
            const rleg = new THREE.Mesh(new THREE.BoxGeometry(0.9,2,1), new THREE.MeshStandardMaterial({color:0x00aa00})); rleg.position.set(0.5,1,0);
            player.add(head, torso, lleg, rleg);
        });

        // --- 4. УПРАВЛЕНИЕ (CLASSIC ROBLOX) ---
        // Логика: WASD бегает относительно камеры. ПКМ крутит камеру.
        
        let camDist = 12;
        let camYaw = 0;   // Поворот по горизонтали
        let camPitch = 0.3; // Поворот по вертикали
        
        // Состояние клавиш
        const keys = { w:false, a:false, s:false, d:false };
        
        // Мышь
        let isRightDown = false;
        
        window.addEventListener('mousedown', e => { if(e.button===2) { isRightDown=true; document.body.classList.add('rotating'); } });
        window.addEventListener('mouseup', e => { if(e.button===2) { isRightDown=false; document.body.classList.remove('rotating'); } });
        window.addEventListener('contextmenu', e => e.preventDefault()); // Блок меню

        window.addEventListener('mousemove', e => {
            if(isRightDown) {
                camYaw -= e.movementX * 0.005;
                camPitch -= e.movementY * 0.005;
                // Ограничение вертикали (чтобы не проваливаться под землю)
                camPitch = Math.max(0.05, Math.min(Math.PI/2 - 0.1, camPitch));
            }
        });
        
        // Зум
        window.addEventListener('wheel', e => {
            camDist += e.deltaY * 0.02;
            camDist = Math.max(4, Math.min(40, camDist));
        });

        // Клавиши
        document.addEventListener('keydown', e => {
            if(document.activeElement === document.getElementById('chat-input')) return;
            if(e.key.toLowerCase() === 'w') keys.w = true;
            if(e.key.toLowerCase() === 's') keys.s = true;
            if(e.key.toLowerCase() === 'a') keys.a = true;
            if(e.key.toLowerCase() === 'd') keys.d = true;
            if(e.key === '/') { e.preventDefault(); document.getElementById('chat-input').focus(); }
        });
        document.addEventListener('keyup', e => {
            if(e.key.toLowerCase() === 'w') keys.w = false;
            if(e.key.toLowerCase() === 's') keys.s = false;
            if(e.key.toLowerCase() === 'a') keys.a = false;
            if(e.key.toLowerCase() === 'd') keys.d = false;
        });

        // --- 5. ФИЗИКА И КАМЕРА ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Движение
            const speed = 0.15;
            const moveVec = new THREE.Vector3(0,0,0);
            
            // Вектор "Вперед" от камеры (игнорируя наклон вверх/вниз)
            const forward = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw)).normalize();
            // Вектор "Вправо"
            const right = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2)).normalize();

            if(keys.w) moveVec.sub(forward);
            if(keys.s) moveVec.add(forward);
            if(keys.a) moveVec.sub(right);
            if(keys.d) moveVec.add(right);

            if(moveVec.length() > 0) {
                player.position.addScaledVector(moveVec.normalize(), speed);
                // Поворот модели в сторону бега
                const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                // Плавный доворот (Lerp угла)
                let diff = targetAngle - player.rotation.y;
                while(diff > Math.PI) diff -= Math.PI*2;
                while(diff < -Math.PI) diff += Math.PI*2;
                player.rotation.y += diff * 0.2;
            }

            // 2. Позиционирование камеры
            // Формула сферы: x = r * sin(yaw) * cos(pitch) ...
            const cx = player.position.x + camDist * Math.sin(camYaw) * Math.cos(camPitch);
            const cy = player.position.y + camDist * Math.sin(camPitch);
            const cz = player.position.z + camDist * Math.cos(camYaw) * Math.cos(camPitch);

            camera.position.set(cx, cy, cz);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 2, 0))); // Смотреть на голову

            renderer.render(scene, camera);
        }
        animate();

        // --- 6. ЧАТ ---
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && chatInput.value.trim() !== "") {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-msg';
                // Формат: [Name]: message
                msgDiv.innerHTML = `[${username}]: ${chatInput.value}`;
                document.getElementById('chat-history').appendChild(msgDiv);
                chatInput.value = "";
                chatInput.blur(); // Снять фокус, чтобы снова ходить
            }
        });
        
        // Ресайз
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
