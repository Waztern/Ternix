<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Player (Fixed Controls)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* --- GUI 2014 --- */
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        /* 1. ЧАТ: ИСТОРИЯ */
        #chat-history {
            position: absolute; top: 5px; left: 5px; width: 500px; height: 300px;
            display: flex; flex-direction: column; justify-content: flex-end;
            overflow: hidden;
            font-size: 16px; color: white; font-weight: bold;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000; /* Обводка */
        }
        .chat-msg { margin-bottom: 2px; padding-left: 5px; }

        /* 2. ЧАТ: ВВОД (СНИЗУ) */
        #chat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 28px;
            background: rgba(0, 0, 0, 0.7); border-top: 1px solid #555;
            pointer-events: auto; display: flex; align-items: center;
        }
        #chat-label { color: #ccc; font-size: 12px; padding: 0 10px; font-weight: bold; }
        #chat-input {
            flex: 1; background: transparent; border: none; color: white; 
            font-size: 14px; outline: none; font-family: 'Verdana', sans-serif;
        }

        /* 3. СПИСОК ИГРОКОВ */
        #player-list {
            position: absolute; top: 0; right: 0; width: 160px;
            background: rgba(30, 30, 30, 0.8); border: 1px solid #000; color: white;
        }
        .pl-head { background: #444; padding: 5px; text-align: center; font-weight: bold; font-size: 12px; }
        .pl-row { padding: 4px; font-size: 12px; display: flex; justify-content: space-between; border-top: 1px solid #555; }
    </style>

    <!-- THREE.JS -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="gui">
        <div id="player-list">
            <div class="pl-head">Players</div>
            <div class="pl-row"><span id="my-name">Guest</span> <span style="color:lime">100</span></div>
        </div>
        <div id="chat-history"></div>
        <div id="chat-bar">
            <div id="chat-label">To Chat:</div>
            <input id="chat-input" type="text" placeholder="Click here or press '/'">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. ИНИЦИАЛИЗАЦИЯ
        const username = localStorage.getItem('ternix_user') || "Player";
        document.getElementById('my-name').innerText = username;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо
        scene.fog = new THREE.Fog(0x87CEEB, 40, 150);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Свет
        scene.add(new THREE.AmbientLight(0x999999));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(20, 50, 20);
        scene.add(dirLight);

        // Пол
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0x4a4a4a }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(300, 75, 0x555555, 0x555555));

        // 2. ИГРОК
        const player = new THREE.Group();
        scene.add(player);

        // Загрузка (с фоллбэком на Нуба)
        new GLTFLoader().load('Ternix.Guy.glb', (gltf) => {
            const model = gltf.scene;
            model.rotation.y = Math.PI; 
            player.add(model);
        }, undefined, () => {
            // Classic Noob
            const matY = new THREE.MeshStandardMaterial({color:0xffff00});
            const matB = new THREE.MeshStandardMaterial({color:0x0000ff});
            const matG = new THREE.MeshStandardMaterial({color:0x00aa00});
            
            const head = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), matY); head.position.y=4.5;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2,2,1), matB); torso.position.y=3;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); lLeg.position.set(-0.5,1,0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); rLeg.position.set(0.5,1,0);
            player.add(head, torso, lLeg, rLeg);
        });

        // 3. УПРАВЛЕНИЕ (ФИЗИКА + КАМЕРА)
        let camDist = 25; // ОТДАЛИЛ КАМЕРУ (Было 12)
        let camYaw = 0, camPitch = 0.4;
        let isLeftDown = false; // ЛЕВАЯ кнопка мыши

        // Физика прыжка
        let velocityY = 0;
        let isGrounded = false;
        const gravity = 0.02;
        const jumpPower = 0.6;

        // Мышь (ЛКМ для вращения)
        window.addEventListener('mousedown', e => { if(e.button === 0) isLeftDown = true; }); // 0 = Left Click
        window.addEventListener('mouseup', e => { if(e.button === 0) isLeftDown = false; });
        
        window.addEventListener('mousemove', e => {
            if(isLeftDown) {
                camYaw -= e.movementX * 0.005;
                camPitch -= e.movementY * 0.005;
                camPitch = Math.max(0.1, Math.min(1.5, camPitch)); // Ограничение, чтобы не уходить под землю
            }
        });

        // Зум (Колесико)
        window.addEventListener('wheel', e => {
            camDist += e.deltaY * 0.05;
            camDist = Math.max(10, Math.min(60, camDist));
        });

        // Клавиши
        const keys = { w:false, a:false, s:false, d:false };
        document.addEventListener('keydown', e => {
            if(document.activeElement === document.getElementById('chat-input')) return;

            if(e.key.toLowerCase() === 'w') keys.w = true;
            if(e.key.toLowerCase() === 's') keys.s = true;
            if(e.key.toLowerCase() === 'a') keys.a = true;
            if(e.key.toLowerCase() === 'd') keys.d = true;
            
            // ПРЫЖОК (Пробел)
            if(e.code === 'Space' && isGrounded) {
                velocityY = jumpPower;
                isGrounded = false;
            }
            
            // Чат
            if(e.key === '/') { e.preventDefault(); document.getElementById('chat-input').focus(); }
        });
        
        document.addEventListener('keyup', e => {
            if(e.key.toLowerCase() === 'w') keys.w = false;
            if(e.key.toLowerCase() === 's') keys.s = false;
            if(e.key.toLowerCase() === 'a') keys.a = false;
            if(e.key.toLowerCase() === 'd') keys.d = false;
        });

        // --- ИГРОВОЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Гравитация
            velocityY -= gravity;
            player.position.y += velocityY;

            // Столкновение с полом
            if(player.position.y <= 0) {
                player.position.y = 0;
                velocityY = 0;
                isGrounded = true;
            }

            // 2. Ходьба
            const moveSpeed = 0.2;
            // Направление камеры (только по горизонту)
            const camDir = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw)).normalize();
            const camRight = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2)).normalize();
            
            const moveVec = new THREE.Vector3(0,0,0);
            if(keys.w) moveVec.sub(camDir);
            if(keys.s) moveVec.add(camDir);
            if(keys.a) moveVec.sub(camRight);
            if(keys.d) moveVec.add(camRight);

            if(moveVec.length() > 0) {
                player.position.addScaledVector(moveVec.normalize(), moveSpeed);
                // Поворот модели
                const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                let diff = targetAngle - player.rotation.y;
                while(diff > Math.PI) diff -= Math.PI*2;
                while(diff < -Math.PI) diff += Math.PI*2;
                player.rotation.y += diff * 0.2;
            }

            // 3. Камера (Chase)
            const cx = player.position.x + camDist * Math.sin(camYaw) * Math.cos(camPitch);
            const cy = player.position.y + camDist * Math.sin(camPitch);
            const cz = player.position.z + camDist * Math.cos(camYaw) * Math.cos(camPitch);

            camera.position.set(cx, cy, cz);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 3, 0))); // Смотрим чуть выше центра

            renderer.render(scene, camera);
        }
        animate();

        // ЧАТ
        const chatIn = document.getElementById('chat-input');
        chatIn.addEventListener('keydown', e => {
            if(e.key === 'Enter' && chatIn.value.trim() !== "") {
                const d = document.createElement('div');
                d.className = 'chat-msg';
                d.innerHTML = `[${username}]: ${chatIn.value}`;
                document.getElementById('chat-history').appendChild(d);
                chatIn.value = "";
                chatIn.blur();
            }
        });
        
        // Ресайз
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
