<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Player (RU Fix)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* --- GUI --- */
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        /* 1. ЧАТ ИСТОРИЯ (Поднял выше) */
        #chat-history {
            position: absolute; top: 10px; left: 10px; width: 500px; height: 350px;
            display: flex; flex-direction: column; justify-content: flex-start; /* Сообщения сверху */
            overflow: hidden;
            font-size: 18px; font-weight: bold;
            /* Классическая жирная обводка */
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }
        .chat-msg { margin-bottom: 4px; color: white; }

        /* 2. СТРОКА ВВОДА (Снизу) */
        #chat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 32px;
            background: rgba(0, 0, 0, 0.8); border-top: 1px solid #666;
            pointer-events: auto; display: flex; align-items: center;
            visibility: hidden; /* Скрыто пока не нажмешь / */
        }
        #chat-bar.active { visibility: visible; }
        
        #chat-label { color: #00a2ff; font-weight: bold; padding: 0 10px; font-size: 14px; }
        #chat-input {
            flex: 1; background: transparent; border: none; color: white; 
            font-size: 16px; outline: none; font-family: 'Arial', sans-serif;
        }

        /* 3. СПИСОК ИГРОКОВ */
        #player-list {
            position: absolute; top: 0; right: 0; width: 180px;
            background: rgba(30, 30, 30, 0.9); border: 1px solid #000; color: white;
            border-bottom-left-radius: 6px;
        }
        .pl-head { background: linear-gradient(#555, #333); padding: 6px; text-align: center; font-weight: bold; }
        .pl-row { padding: 5px 10px; font-size: 14px; display: flex; justify-content: space-between; border-top: 1px solid #555; }
    </style>

    <!-- THREE.JS -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="gui">
        <div id="player-list">
            <div class="pl-head">Players</div>
            <!-- Игрок в списке -->
            <div class="pl-row">
                <span id="my-name-list">Guest</span> 
                <span style="color:lime">100</span>
            </div>
        </div>

        <div id="chat-history">
            <!-- Сообщения -->
        </div>
        
        <div id="chat-bar">
            <div id="chat-label">Say:</div>
            <input id="chat-input" type="text">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. НАСТРОЙКИ ИГРОКА
        const username = localStorage.getItem('ternix_user') || "Player1";
        
        // Генерация цвета ника (Хэш)
        function getNameColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
            return "#" + "00000".substring(0, 6 - c.length) + c;
        }
        const myColor = getNameColor(username);
        
        // Обновляем UI
        const nameLabel = document.getElementById('my-name-list');
        nameLabel.innerText = username;
        nameLabel.style.color = myColor;

        // 2. СЦЕНА
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Свет
        scene.add(new THREE.AmbientLight(0x888888));
        const sun = new THREE.DirectionalLight(0xffffff, 1.3);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // Пол
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshStandardMaterial({ color: 0x4a4a4a }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(400, 100, 0x666666, 0x555555));

        // ---- Добавляем несколько предметов (деревья, камни) ----
        function createTree(x, z) {
            const group = new THREE.Group();
            // Ствол
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 2), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            trunk.position.y = 1;
            group.add(trunk);
            // Листва (три сферы)
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E8B57 });
            const leaf1 = new THREE.Mesh(new THREE.SphereGeometry(0.8), leafMat);
            leaf1.position.y = 2.5;
            group.add(leaf1);
            const leaf2 = new THREE.Mesh(new THREE.SphereGeometry(0.6), leafMat);
            leaf2.position.set(0.6, 2, 0.6);
            group.add(leaf2);
            const leaf3 = new THREE.Mesh(new THREE.SphereGeometry(0.6), leafMat);
            leaf3.position.set(-0.6, 2, -0.6);
            group.add(leaf3);
            group.position.set(x, 0, z);
            return group;
        }

        function createRock(x, z) {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.8), new THREE.MeshStandardMaterial({ color: 0x808080 }));
            rock.position.set(x, 0.4, z);
            return rock;
        }

        function createLamppost(x, z) {
            const group = new THREE.Group();
            const poleMat = new THREE.MeshStandardMaterial({ color: 0xAAAAAA });
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3), poleMat);
            pole.position.y = 1.5;
            group.add(pole);
            const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0x442200 }));
            lamp.position.y = 3;
            group.add(lamp);
            group.position.set(x, 0, z);
            return group;
        }

        // Расставляем объекты
        scene.add(createTree(10, 10));
        scene.add(createTree(-8, 12));
        scene.add(createTree(15, -5));
        scene.add(createRock(5, 20));
        scene.add(createRock(-12, -10));
        scene.add(createRock(20, 5));
        scene.add(createLamppost(-15, 15));
        scene.add(createLamppost(20, -20));
        // ---------------------------------------------

        // 3. ИГРОК (Загрузка)
        const player = new THREE.Group();
        scene.add(player);

        new GLTFLoader().load('Ternix.Guy.glb', (gltf) => {
            const model = gltf.scene;
            model.rotation.y = Math.PI; 
            player.add(model);
        }, undefined, () => {
            // Fallback Noob
            const matY = new THREE.MeshStandardMaterial({color:0xffff00});
            const matB = new THREE.MeshStandardMaterial({color:0x0000ff});
            const matG = new THREE.MeshStandardMaterial({color:0x00aa00});
            const head = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), matY); head.position.y=4.5;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2,2,1), matB); torso.position.y=3;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); lLeg.position.set(-0.5,1,0);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), matG); rLeg.position.set(0.5,1,0);
            player.add(head, torso, lLeg, rLeg);
        });

        // 4. УПРАВЛЕНИЕ (ИСПРАВЛЕНО ДЛЯ RU КЛАВИАТУР)
        let camDist = 20;
        let camYaw = 0, camPitch = 0.5;
        let isLeftDown = false;
        let velocityY = 0;
        let isGrounded = false;

        // Мышь
        window.addEventListener('mousedown', e => { if(e.button===0) isLeftDown=true; });
        window.addEventListener('mouseup', e => { if(e.button===0) isLeftDown=false; });
        window.addEventListener('mousemove', e => {
            if(isLeftDown) {
                camYaw -= e.movementX * 0.005;
                camPitch -= e.movementY * 0.005;
                camPitch = Math.max(0.1, Math.min(1.5, camPitch));
            }
        });
        window.addEventListener('wheel', e => {
            camDist += e.deltaY * 0.05;
            camDist = Math.max(5, Math.min(50, camDist));
        });

        // КЛАВИШИ (Важно: используем code, а не key)
        const keys = { w:false, a:false, s:false, d:false };
        
        document.addEventListener('keydown', e => {
            // Если чат открыт - не двигаемся (кроме Enter/Escape)
            if(document.getElementById('chat-bar').classList.contains('active')) {
                if(e.code === 'Enter') {
                    e.preventDefault(); // предотвращаем возможный сабмит
                    sendChat();
                }
                if(e.code === 'Escape') {
                    closeChat();
                }
                return; // не обрабатываем остальные клавиши
            }

            if(e.code === 'KeyW') keys.w = true;
            if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'KeyA') keys.a = true;
            if(e.code === 'KeyD') keys.d = true;
            
            if(e.code === 'Space' && isGrounded) {
                velocityY = 0.6; // Прыжок
                isGrounded = false;
            }
            
            // Открыть чат на Slash (/)
            if(e.code === 'Slash') {
                e.preventDefault();
                openChat();
            }
        });
        
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') keys.w = false;
            if(e.code === 'KeyS') keys.s = false;
            if(e.code === 'KeyA') keys.a = false;
            if(e.code === 'KeyD') keys.d = false;
        });

        // 5. ФИЗИКА LOOP
        function animate() {
            requestAnimationFrame(animate);

            // Гравитация
            velocityY -= 0.025;
            player.position.y += velocityY;
            if(player.position.y <= 0) {
                player.position.y = 0;
                velocityY = 0;
                isGrounded = true;
            }

            // Движение
            const camDir = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw)).normalize();
            const camRight = new THREE.Vector3(Math.sin(camYaw - Math.PI/2), 0, Math.cos(camYaw - Math.PI/2)).normalize();
            
            const move = new THREE.Vector3(0,0,0);
            if(keys.w) move.sub(camDir);
            if(keys.s) move.add(camDir);
            if(keys.a) move.sub(camRight);
            if(keys.d) move.add(camRight);

            if(move.length() > 0) {
                player.position.addScaledVector(move.normalize(), 0.2);
                // Поворот модели (плавный)
                const targetAngle = Math.atan2(move.x, move.z);
                let diff = targetAngle - player.rotation.y;
                while(diff > Math.PI) diff -= Math.PI*2;
                while(diff < -Math.PI) diff += Math.PI*2;
                player.rotation.y += diff * 0.15; // чуть медленнее для плавности
            }

            // Камера
            const cx = player.position.x + camDist * Math.sin(camYaw) * Math.cos(camPitch);
            const cy = player.position.y + camDist * Math.sin(camPitch);
            const cz = player.position.z + camDist * Math.cos(camYaw) * Math.cos(camPitch);
            camera.position.set(cx, cy, cz);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 3, 0)));

            renderer.render(scene, camera);
        }
        animate();

        // 6. ЛОГИКА ЧАТА
        const chatBar = document.getElementById('chat-bar');
        const chatIn = document.getElementById('chat-input');
        const chatHist = document.getElementById('chat-history');

        function openChat() {
            chatBar.classList.add('active');
            chatIn.focus();
            // Сброс движения при открытии чата
            keys.w = keys.a = keys.s = keys.d = false;
        }
        
        function closeChat() {
            chatBar.classList.remove('active');
            chatIn.blur();
        }

        function sendChat() {
            const txt = chatIn.value.trim();
            if(txt) {
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                // Цветной ник: [Name]: Message
                msg.innerHTML = `<span style="color:${myColor}">[${username}]:</span> ${txt}`;
                chatHist.appendChild(msg);
                
                // Авто-скролл
                chatHist.scrollTop = chatHist.scrollHeight;
            }
            chatIn.value = "";
            closeChat();
        }
        
        // Ресайз
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Системное сообщение при старте УДАЛЕНО по просьбе
    </script>
</body>
</html>
