<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix Game Client</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }

        /* --- GUI 2014 --- */
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        /* ЧАТ (ЛЕВЫЙ ВЕРХ) - ПРОЗРАЧНЫЙ */
        #chat-box {
            position: absolute; top: 20px; left: 20px; width: 400px; height: 250px;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        #chat-msgs {
            max-height: 220px; overflow-y: hidden; 
            /* СТИЛЬ 2014: Белый текст, черная обводка, БЕЗ ФОНА */
            color: white; font-weight: bold; font-size: 16px; 
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            line-height: 1.4;
        }
        #chat-input {
            pointer-events: auto; visibility: hidden; /* Скрыт по умолчанию */
            background: rgba(0,0,0,0.7); border: 1px solid #fff; color: white; padding: 5px;
            margin-top: 5px;
        }

        /* СПИСОК ИГРОКОВ (ПРАВЫЙ ВЕРХ) */
        #leaderboard {
            position: absolute; top: 0; right: 20px; width: 180px;
            background: rgba(30,30,30,0.8); color: white; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px;
        }
        .lb-head { background: rgba(50,50,50,0.9); padding: 5px; font-weight: bold; text-align: center; font-size: 13px; }
        .lb-row { padding: 4px 8px; font-size: 12px; border-top: 1px solid #555; display: flex; justify-content: space-between; }

        /* КЛИК ЧТОБЫ ИГРАТЬ */
        #start-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 20;
            display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer;
        }
        .msg { background: white; border: 4px solid #0055b3; padding: 20px; font-weight: bold; font-size: 20px; }
    </style>
    
    <!-- БИБЛИОТЕКИ (THREE.JS) -->
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="gui">
        <div id="leaderboard">
            <div class="lb-head">Players</div>
            <div class="lb-row"><span id="my-nick">Guest</span> <span>100</span></div>
        </div>
        <div id="chat-box">
            <div id="chat-msgs">
                <div>System: Welcome to TerNix. Press '/' to chat.</div>
            </div>
            <input id="chat-input" type="text" placeholder="Say something...">
        </div>
    </div>

    <div id="start-screen">
        <div class="msg">Click to Play</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- НАСТРОЙКИ ---
        const username = localStorage.getItem('ternix_user') || "Guest";
        document.getElementById('my-nick').innerText = username;

        // --- 1. СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Свет
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Пол (Baseplate)
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- 2. ИГРОК (ТРЕТЬЕ ЛИЦО) ---
        // Контейнер игрока (это то, что мы двигаем)
        const playerGroup = new THREE.Group();
        playerGroup.position.set(0, 0, 0);
        scene.add(playerGroup);

        // Загрузка модели
        const loader = new GLTFLoader();
        loader.load('Ternix.Guy.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(1, 1, 1); 
            // Разворачиваем модель, если она смотрит не туда (Roblox модели часто смотрят назад)
            model.rotation.y = Math.PI; 
            playerGroup.add(model);
        }, undefined, () => {
            // Если модели нет, создаем "Нуба" (кубик)
            const geometry = new THREE.BoxGeometry(1, 2, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0xffff00 });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.y = 1;
            playerGroup.add(cube);
        });

        // --- 3. УПРАВЛЕНИЕ КАМЕРОЙ И ХОДЬБОЙ ---
        // Камера привязана к "палке" (Boom), которая вращается
        let cameraAngleY = 0; // Поворот камеры
        const cameraDist = 10;
        const cameraHeight = 5;

        // Кнопки
        const keys = { w: false, a: false, s: false, d: false };
        
        document.addEventListener('keydown', (e) => {
            if (document.activeElement === document.getElementById('chat-input')) return; // Не двигаться если пишем в чат
            if(e.key === 'w' || e.key === 'W') keys.w = true;
            if(e.key === 's' || e.key === 'S') keys.s = true;
            if(e.key === 'a' || e.key === 'A') keys.a = true;
            if(e.key === 'd' || e.key === 'D') keys.d = true;
            if(e.key === '/') {
                e.preventDefault();
                const inp = document.getElementById('chat-input');
                inp.style.visibility = 'visible';
                inp.focus();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if(e.key === 'w' || e.key === 'W') keys.w = false;
            if(e.key === 's' || e.key === 'S') keys.s = false;
            if(e.key === 'a' || e.key === 'A') keys.a = false;
            if(e.key === 'd' || e.key === 'D') keys.d = false;
        });

        // Вращение мышкой (Захват курсора)
        document.getElementById('start-screen').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('start-screen').style.display = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                // Вращаем персонажа
                playerGroup.rotation.y -= e.movementX * 0.005;
                // Можно добавить наклон камеры вверх/вниз (пока пропустим для простоты)
            }
        });

        // --- 4. ЧАТ ЛОГИКА ---
        const chatIn = document.getElementById('chat-input');
        chatIn.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                const txt = chatIn.value;
                if(txt) {
                    const div = document.createElement('div');
                    div.innerHTML = `[${username}]: ${txt}`;
                    document.getElementById('chat-msgs').appendChild(div);
                }
                chatIn.value = '';
                chatIn.style.visibility = 'hidden';
                chatIn.blur();
                document.body.requestPointerLock(); // Вернуть управление
            }
        });

        // --- 5. ГЛАВНЫЙ ЦИКЛ (LOOP) ---
        function animate() {
            requestAnimationFrame(animate);

            // Логика движения
            const speed = 0.15;
            if (keys.w) playerGroup.translateZ(-speed); // Вперед
            if (keys.s) playerGroup.translateZ(speed);  // Назад
            if (keys.a) playerGroup.translateX(-speed); // Влево
            if (keys.d) playerGroup.translateX(speed);  // Вправо

            // Обновление камеры (вид от 3-го лица)
            // Камера всегда сзади игрока
            // Мы берем позицию игрока и сдвигаем камеру назад и вверх относительно его поворота
            
            const relativeOffset = new THREE.Vector3(0, cameraHeight, cameraDist);
            const cameraOffset = relativeOffset.applyMatrix4(playerGroup.matrixWorld);
            
            // Плавное слежение (Lerp)
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(playerGroup.position.clone().add(new THREE.Vector3(0, 2, 0))); // Смотреть чуть выше ног

            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
