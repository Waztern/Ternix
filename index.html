<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix - Home</title>
    <style>
        body { margin: 0; font-family: 'Verdana', sans-serif; background-color: #e3e3e3; }
        
        /* ЭКРАН ВХОДА (Отдельный слой) */
        #login-screen {
            position: fixed; inset: 0; background: #232323; 
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            width: 300px; background: white; border: 1px solid #999; padding: 5px;
        }
        .lb-header {
            background: linear-gradient(to bottom, #0074bd, #0055b3);
            color: white; padding: 8px; font-weight: bold; font-size: 14px; border: 1px solid #003366;
        }
        .lb-content { border: 1px solid #aaa; padding: 20px; text-align: center; background: #eee; }
        input { display: block; width: 90%; margin: 10px auto; padding: 5px; }
        button {
            background: linear-gradient(to bottom, #66cc00, #008800);
            color: white; font-weight: bold; border: 1px solid #005500;
            padding: 5px 20px; cursor: pointer;
        }

        /* САЙТ (Скрыт до входа) */
        #site-container { display: none; }

        /* ШАПКА 2014 */
        .header { height: 34px; background: #1e1e1e; border-bottom: 1px solid white; display: flex; align-items: center; color: white; padding: 0 100px; font-size: 12px; }
        .nav-blue { height: 30px; background: #0074bd; border-top: 1px solid #ffffff; border-bottom: 1px solid #003366; display: flex; align-items: center; padding: 0 100px; color: white; font-weight: bold; font-size: 13px; gap: 20px; }
        
        .content { width: 900px; margin: 20px auto; background: white; border: 1px solid #aaa; min-height: 600px; padding: 15px; }
        
        .game-card { width: 150px; border: 1px solid #ccc; cursor: pointer; }
        .game-thumb { width: 150px; height: 100px; background: #555; }
        .game-title { color: #0055b3; font-weight: bold; font-size: 12px; padding: 4px; }
        .game-maker { font-size: 10px; color: #666; padding: 0 4px 4px; }
    </style>
</head>
<body>

    <!-- 1. ВХОД -->
    <div id="login-screen">
        <div class="login-box">
            <div class="lb-header">Login to TerNix</div>
            <div class="lb-content">
                <input id="u-name" placeholder="Username">
                <button onclick="login()">Login</button>
                <div id="error" style="color:red; font-size:10px; margin-top:5px;"></div>
            </div>
        </div>
    </div>

    <!-- 2. САЙТ -->
    <div id="site-container">
        <div class="header">
            <div style="font-weight:900; font-size:18px; margin-right:20px;">TERNIX</div>
            <div style="flex:1;"></div>
            <div id="user-stats">User: Guest | Firens: 0 | Nex: 0</div>
        </div>
        <div class="nav-blue">
            <div>Games</div> <div>Catalog</div> <div>People</div> <div>Forum</div>
        </div>
        <div class="content">
            <h3>Games</h3>
            <div class="game-card" onclick="window.location.href='game.html'">
                <div class="game-thumb"></div>
                <div class="game-title">TerNix Place</div>
                <div class="game-maker">By Admin</div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('u-name').value;
            const regex = /^[a-zA-Z0-9]+$/;
            if (!regex.test(u)) {
                document.getElementById('error').innerText = "English Only!";
                return;
            }
            
            // Сохраняем и переключаем экран
            localStorage.setItem('ternix_user', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('site-container').style.display = 'block';
            document.getElementById('user-stats').innerText = `User: ${u} | Firens: 100 | Nex: 15`;
        }
    </script>
</body>
</html>
