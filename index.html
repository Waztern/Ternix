<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix - Home (2014)</title>
    <style>
        /* ОБЩИЙ СТИЛЬ 2014 */
        body { margin: 0; font-family: 'Verdana', sans-serif; background-color: #e3e3e3; font-size: 12px; }
        
        /* ОКНО ВХОДА (ОТДЕЛЬНОЕ) */
        #login-overlay {
            position: fixed; inset: 0; background: #2d2d2d; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            width: 320px; background: white; border: 1px solid #000;
        }
        .lb-header {
            background: linear-gradient(#0074bd, #0055b3);
            padding: 8px; color: white; font-weight: bold; border-bottom: 1px solid #003366;
        }
        .lb-body { padding: 20px; background: #f2f2f2; text-align: center; }
        
        input { display: block; width: 90%; margin: 5px auto; padding: 6px; border: 1px solid #aaa; }
        button {
            margin-top: 10px; padding: 6px 20px; cursor: pointer; font-weight: bold;
            background: linear-gradient(#66cc00, #449900); color: white; border: 1px solid #005500;
        }
        
        /* САЙТ */
        #site { display: none; } /* Скрыт до входа */
        
        .header { height: 35px; background: #1e1e1e; color: white; display: flex; align-items: center; padding: 0 50px; border-bottom: 1px solid white; }
        .nav { height: 30px; background: #0074bd; display: flex; align-items: center; padding: 0 50px; color: white; font-weight: bold; border-bottom: 2px solid #003366; gap: 20px; }
        
        .container { width: 900px; margin: 15px auto; background: white; border: 1px solid #aaa; min-height: 600px; padding: 15px; }
        .stat-bar { float: right; font-size: 11px; }
        
        .game-card {
            width: 160px; border: 1px solid #ccc; display: inline-block; margin-right: 10px; cursor: pointer;
        }
        .game-card:hover { border-color: #0074bd; }
        .thumb { height: 100px; background: #555; }
        .info { padding: 5px; }
        .g-title { color: #0055b3; font-weight: bold; font-size: 13px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="lb-header">Login to TerNix</div>
            <div class="lb-body">
                <input id="u-name" placeholder="Username">
                <input id="u-pass" type="password" placeholder="Password">
                <button onclick="doLogin()">Login</button>
                <div id="err" style="color:red; margin-top:5px; font-size:10px;"></div>
            </div>
        </div>
    </div>

    <!-- ГЛАВНАЯ -->
    <div id="site">
        <div class="header">
            <span style="font-size:18px; font-weight:900;">TERNIX</span>
            <div style="flex:1"></div>
            <div class="stat-bar">
                User: <b id="disp-name">Guest</b> | Firens: 100 | Nex: 10
            </div>
        </div>
        <div class="nav">
            <div>Games</div> <div>Catalog</div> <div>Develop</div> <div>Forum</div>
        </div>
        <div class="container">
            <h3>Games</h3>
            <div class="game-card" onclick="window.location.href='game.html'">
                <div class="thumb"></div>
                <div class="info">
                    <div class="g-title">TerNix Place</div>
                    <div style="font-size:10px; color:#666;">By Admin</div>
                    <div style="font-size:10px; color:green;">12 Playing</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function doLogin() {
            const u = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;
            const err = document.getElementById('err');

            if(u.length < 3) { err.innerText = "Username too short"; return; }
            if(p.length === 0) { err.innerText = "Enter a password!"; return; } // Проверка пароля

            // Успех
            localStorage.setItem('ternix_user', u);
            document.getElementById('disp-name').innerText = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('site').style.display = 'block';
        }
    </script>
</body>
</html>
