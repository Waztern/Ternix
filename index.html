<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TerNix — 2014</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Verdana', sans-serif; background: #000; }
        #gui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 35px; background: #fff; border-bottom: 1px solid #000; display: flex; align-items: center; padding: 0 10px; pointer-events: auto; }
        #exit-btn { border: 1px solid #000; background: #eee; cursor: pointer; padding: 2px 10px; font-size: 12px; }
        #player-list { position: absolute; top: 45px; right: 10px; width: 150px; background: #fff; border: 1px solid #000; pointer-events: auto; }
        .pl-head { background: #eee; padding: 5px; text-align: center; border-bottom: 1px solid #000; font-weight: bold; }
        #chat-panel { position: absolute; bottom: 10px; left: 10px; width: 400px; pointer-events: auto; }
        #chat-history { height: 120px; background: rgba(0,0,0,0.5); border: 1px solid #000; color: #fff; overflow-y: auto; padding: 5px; font-size: 13px; }
        #chat-input-area { display: flex; margin-top: 2px; }
        #chat-input { flex: 1; border: 1px solid #000; padding: 4px; outline: none; }
        #chat-input:disabled { background: rgba(255,255,255,0.2); color: transparent; border: none; }
    </style>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com", "three/addons/": "https://unpkg.com" } }</script>
</head>
<body>
    <div id="gui">
        <div id="top-bar"><div id="exit-btn" onclick="location.href='index.html'">Exit</div></div>
        <div id="player-list"><div class="pl-head">Players</div><div id="p-name" style="padding:5px;"></div></div>
        <div id="chat-panel">
            <div id="chat-history"></div>
            <div id="chat-input-area">
                <input id="chat-input" placeholder='Press "/" to chat' disabled>
            </div>
        </div>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const username = localStorage.getItem('ternix_user') || "Guest";
        document.getElementById('p-name').innerText = username;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const plate = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x4CAF50}));
        plate.rotation.x = -Math.PI/2; scene.add(plate);

        const player = new THREE.Group(); scene.add(player);
        new GLTFLoader().load('Ternix.Guy.glb', (gltf) => { player.add(gltf.scene); }, undefined, () => {
            const box = new THREE.Mesh(new THREE.BoxGeometry(2,4,1), new THREE.MeshStandardMaterial({color: 0x0000ff}));
            box.position.y = 2; player.add(box);
        });

        let camYaw = 0, camPitch = 0.5, camDist = 20, isMouseDown = false;
        const keys = { w:0, a:0, s:0, d:0 };
        
        window.onmousedown = (e) => { if(e.button===0) isMouseDown = true; };
        window.onmouseup = () => isMouseDown = false;
        window.onmousemove = (e) => { if(isMouseDown) { camYaw -= e.movementX*0.005; camPitch = Math.max(0.1, Math.min(1.5, camPitch - e.movementY*0.005)); }};
        window.onkeydown = (e) => {
            const chat = document.getElementById('chat-input');
            if(!chat.disabled) { if(e.code==='Enter') sendChat(); return; }
            if(e.code==='KeyW') keys.w=1; if(e.code==='KeyS') keys.s=1;
            if(e.code==='KeyA') keys.a=1; if(e.code==='KeyD') keys.d=1;
            if(e.code==='Slash') { e.preventDefault(); chat.disabled=false; chat.focus(); }
        };
        window.onkeyup = (e) => { if(e.code==='KeyW') keys.w=0; if(e.code==='KeyS') keys.s=0; if(e.code==='KeyA') keys.a=0; if(e.code==='KeyD') keys.d=0; };

        const chatColors = ['#ff00ff', '#ffff00', '#00aaff'];
        function sendChat() {
            const input = document.getElementById('chat-input');
            if(input.value.trim()) {
                const m = document.createElement('div');
                m.innerHTML = `<span style="color:${chatColors[Math.floor(Math.random()*3)]}">[${username}]:</span> ${input.value}`;
                document.getElementById('chat-history').appendChild(m);
            }
            input.value = ""; input.disabled = true; input.blur();
        }

        function animate() {
            requestAnimationFrame(animate);
            const forward = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw));
            const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward);
            let move = new THREE.Vector3(0,0,0);
            if(keys.w) move.add(forward); if(keys.s) move.sub(forward);
            if(keys.a) move.add(right); if(keys.d) move.sub(right);
            if(move.length() > 0) {
                player.position.addScaledVector(move.normalize(), 0.2);
                player.rotation.y = Math.atan2(move.x, move.z);
            }
            camera.position.set(player.position.x + camDist*Math.sin(camYaw)*Math.cos(camPitch), player.position.y + camDist*Math.sin(camPitch)+3, player.position.z + camDist*Math.cos(camYaw)*Math.cos(camPitch));
            camera.lookAt(player.position.x, player.position.y+3, player.position.z);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
